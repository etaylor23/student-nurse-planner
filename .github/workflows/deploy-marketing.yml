name: Deploy marketing site (S3 + CloudFront)

# Builds the Astro marketing site (site/) and publishes it to the NursePlanner-Marketing
# S3 bucket, then invalidates CloudFront. Bucket + distribution id are read from the
# NursePlanner-Marketing stack outputs, so this only works AFTER that stack is deployed.
#
# Requires the OIDC role (github-actions-deploy) to allow: cloudformation:DescribeStacks
# on NursePlanner-*, S3 read/write on the placemate-marketing-* bucket, and
# cloudfront:CreateInvalidation — see ../perms.json (applied as the `deploy` inline policy).

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".github/workflows/deploy-marketing.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-marketing
  cancel-in-progress: true

jobs:
  deploy:
    name: publish marketing site → NursePlanner-Marketing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run build
      - name: Assume AWS deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::641364901830:role/github-actions-deploy
          aws-region: eu-west-2
      - name: Resolve stack outputs
        id: outputs
        run: |
          STACK="NursePlanner-Marketing"
          get() { aws cloudformation describe-stacks --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "bucket=$(get MarketingBucketName)" >> "$GITHUB_OUTPUT"
          echo "distribution=$(get MarketingDistributionId)" >> "$GITHUB_OUTPUT"
      - name: Sync to S3
        env:
          BUCKET: ${{ steps.outputs.outputs.bucket }}
        run: |
          # Hashed, content-addressed assets → cache forever, immutable.
          aws s3 sync site/dist/ "s3://$BUCKET/" \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*" --include "_astro/*"
          # Everything else (HTML, sitemap, robots, llms.txt, images) → short cache;
          # --delete prunes removed files (but leaves the excluded _astro/* in place).
          aws s3 sync site/dist/ "s3://$BUCKET/" --delete \
            --cache-control "public,max-age=300,must-revalidate" \
            --exclude "_astro/*"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/*"
