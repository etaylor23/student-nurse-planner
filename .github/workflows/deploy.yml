name: Deploy to GitHub Pages

# Build the Vite SPA and publish it to GitHub Pages on every push to master.
# One-time setup: repo Settings → Pages → Build and deployment → Source = "GitHub
# Actions" (the configure-pages step below also attempts to enable it automatically).

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Serve under the project sub-path on github.io.
          VITE_BASE: /student-nurse-planner/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
