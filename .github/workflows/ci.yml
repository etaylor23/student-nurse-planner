name: CI

# App checks + infra synth. Runs on every PR and on master. Needs NO AWS credentials:
# the CDK app uses an explicit account/region (no context lookups), so `cdk synth` is
# reproducible offline — the Phase 0 acceptance criterion "cdk synth reproducible in CI".

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: App — typecheck, zod codegen drift, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Zod schemas are up to date (ts-to-zod)
        run: npm run gen:zod:check
      - name: Tests
        run: npm test

  infra:
    name: Infra — cdk synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - name: Install infra deps
        working-directory: infra
        run: npm ci
      - name: cdk synth (both envs)
        working-directory: infra
        run: npx cdk synth
